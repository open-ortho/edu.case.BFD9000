{% extends 'archive/base_index.html' %} {% block content %}
<div class="flex-[1_1_0] flex flex-col items-center justify-center p-8">
    <div class="card bg-base-200 shadow-xl max-w-2xl w-full">
        <div class="card-body items-center text-center">
            <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="size-24 text-warning mb-4"
            >
                <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M11.42 15.17 17.25 21A2.652 2.652 0 0 0 21 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 1 1-3.586-3.586l6.837-5.63m5.108-.233c.55-.164 1.163-.188 1.743-.14a4.5 4.5 0 0 0 4.486-6.336l-3.276 3.277a3.004 3.004 0 0 1-2.25-2.25l3.276-3.276a4.5 4.5 0 0 0-6.336 4.486c.091 1.076-.071 2.264-.904 2.95l-.102.085m-1.745 1.437L5.909 7.5H4.5L2.25 3.75l1.5-1.5L7.5 4.5v1.409l4.26 4.26m-1.745 1.437 1.745-1.437m6.615 8.206L15.75 15.75M4.867 19.125h.008v.008h-.008v-.008Z"
                />
            </svg>
            <h2 class="card-title text-3xl">Record View Under Construction</h2>
            <p class="text-base-content/70 text-lg">
                The individual record detail view is currently being developed.
            </p>
            <p class="text-base-content/50 mt-2">
                Record ID:
                <span class="font-mono font-bold">{{ record_id }}</span>
            </p>
            <div class="card-actions justify-center mt-6">
                <a href="/records/" class="btn btn-primary">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="size-5"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"
                        />
                    </svg>
                    Back to Records
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
