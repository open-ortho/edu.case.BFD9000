{% extends 'archive/base_index.html' %} {% block content %}
<div class="flex-[1_1_0] flex flex-col overflow-auto">
    <div class="bg-base-200 p-3 border-b border-base-300">
        <div class="flex gap-2 items-center">
            <input
                type="text"
                id="search-input"
                placeholder="Search by subject identifier"
                class="input input-bordered input-sm flex-1 max-w-md"
            />
            <button id="search-button" class="btn btn-sm btn-primary">
                Search
            </button>
            <button id="clear-search-button" class="btn btn-sm btn-ghost">
                Clear
            </button>
        </div>
    </div>
    <div class="min-w-0 flex-[1_1_0] overflow-y-auto">
        <table
            class="table table-xs md:table-sm lg:table-md table-pin-rows table-zebra"
        >
            <thead>
                <tr>
                    <th>Identifier</th>
                    <th>Record Type</th>
                    <th>Subject</th>
                    <th>Age</th>
                    <th>Acquired</th>
                    <th>Operator</th>
                    <th>Locations</th>
                    <th>Notes</th>
                </tr>
            </thead>
            <tbody id="record_table_body">
                {% for _ in ' ' %}
                <tr>
                    <td colspan="8">
                        <div class="flex w-full gap-4">
                            <div class="skeleton h-[1lh] w-1/3"></div>
                            <div class="skeleton h-[1lh] grow"></div>
                            <div class="skeleton h-[1lh] w-1/2"></div>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <div class="bg-base-300 p-2 flex items-center gap-3">
        <div class="grow"></div>
        <span class="text-sm text-base-content/60">
            <span id="record-count-badge"></span>
            <span class="ml-1">physical records</span>
        </span>
    </div>
</div>
{% endblock %} {% block head %} {{ block.super }}
<script>
    function formatAge(ageYears) {
        if (ageYears === null || ageYears === undefined) return '-';
        const wholeYears = Math.floor(ageYears);
        let months = Math.round((ageYears - wholeYears) * 12);
        let years = wholeYears;
        if (months === 12) { years += 1; months = 0; }
        return `${years}y ${months}m`;
    }

    async function fetchPhysicalRecords(params = {}) {
        const { search = "", page = 1, page_size = 20, ...extra } = params;
        const urlParams = new URLSearchParams({
            page: page.toString(),
            page_size: page_size.toString(),
        });

        if (search) {
            urlParams.set("search", search);
        }
        for (const [key, value] of Object.entries(extra)) {
            if (value !== null && value !== undefined && value !== "") {
                urlParams.set(key, value.toString());
            }
        }

        const response = await fetch((window.script_name || '') + `/api/physical-records/?${urlParams}`);
        if (!response.ok) {
            throw new Error(`API error: ${response.status}`);
        }
        return await response.json();
    }

    function formatLocations(locations) {
        if (!locations || locations.length === 0) return "-";
        return locations.map(loc => {
            const parts = [loc.cabinet, loc.shelf, loc.slot].filter(Boolean);
            return parts.join("-") || loc.raw || "(unknown)";
        }).join(", ");
    }

    const tableManager = new InfiniteScrollTableManager({
        tableBodyId: "record_table_body",
        columnCount: 8,
        countBadgeId: "record-count-badge",
        fetchData: fetchPhysicalRecords,
        renderRows: (records) => {
            return records.map((record) => {
                const row = document.createElement("tr");

                const idCell = document.createElement("td");
                idCell.textContent = record.identifier_str || "-";
                idCell.classList.add("font-mono");

                const recordType = document.createElement("td");
                recordType.textContent = record.record_type?.display || record.record_type?.code || "-";
                if (record.record_type?.code) {
                    recordType.title = record.record_type.code;
                }

                const subject = document.createElement("td");
                const subjectBtn = document.createElement("button");
                subjectBtn.className = "btn btn-soft btn-xs";
                subjectBtn.textContent = record.subject_identifier || record.subject_id || "-";
                subjectBtn.onclick = () =>
                    (window.location.href = (window.script_name || '') + `/subject/${record.subject_id}/`);
                subject.appendChild(subjectBtn);

                const encounter = document.createElement("td");
                encounter.textContent = formatAge(record.age_at_encounter);

                const acquired = document.createElement("td");
                acquired.textContent = record.acquisition_datetime
                    ? record.acquisition_datetime.substring(0, 10)
                    : "-";

                const operator = document.createElement("td");
                operator.textContent = record.operator || "-";

                const locations = document.createElement("td");
                locations.textContent = formatLocations(record.locations);

                const notes = document.createElement("td");
                notes.textContent = record.notes || "-";
                notes.classList.add("max-w-xs", "truncate");
                notes.title = record.notes || "";

                row.replaceChildren(idCell, recordType, subject, encounter, acquired, operator, locations, notes);
                return row;
            });
        },
        getEmptyStateMessage: (hasSearch) => {
            return hasSearch
                ? "No physical records found matching your search"
                : "No physical records found";
        },
    });

    document.addEventListener("DOMContentLoaded", () => {
        tableManager.init();
        attachSearchTooltip();
    });
</script>
{% endblock %}
