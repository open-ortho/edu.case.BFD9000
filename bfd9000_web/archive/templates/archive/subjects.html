{% extends 'archive/base_index.html' %}

{% block content %}
<div class="flex-[1_1_0] flex flex-col overflow-x-auto">
    <div class="min-w-0 flex-[1_1_0] overflow-y-auto">
        <table class="table table-xs md:table-sm lg:table-md table-pin-rows table-zebra">
            <!-- head -->
            <thead>
                <tr>
                    <th>Subject</th>
                    <th>Encounters</th>
                    <th>Records</th>
                    <th>Dental Classification</th>
                    <th>Collection</th>
                </tr>
            </thead>
            <tbody id="subject_table_body">
                {% for _ in '    ' %}
                    <tr>
                        <td colspan="9">
                            <div class="flex w-full gap-4">
                                <div class="skeleton h-[1lh] w-1/3"></div>
                                <div class="skeleton h-[1lh] grow"></div>
                                <div class="skeleton h-[1lh] w-1/2"></div>
                            </div>
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <div class="bg-base-300 p-2 flex">
        <a href="{% url 'archive:subject_create' %}" class="btn btn-primary rounded-full">New</a>
        <div class="grow"></div>
        <div class="join">
            <button class="join-item btn rounded-l-full" id="prev-button" disabled>«</button>
            <button class="join-item btn" id="page-button">Page 1 / 0</button>
            <button class="join-item btn rounded-r-full" id="next-button" disabled>»</button>
        </div>
    </div>
</div>
{% endblock %}

{%block head %}
    <script>
        let loaded = false;

        // dummy data instead of a fetch
        let subjects = [
            { id: "B0001", encounters: 2, records: 3, dental_classification: "ABC", collection: "Collection A" },
            { id: "B0002", encounters: 3, records: 4, dental_classification: "DEF", collection: "Collection B" },
            { id: "B0003", encounters: 4, records: 5, dental_classification: "GHI", collection: "Collection C" },
            { id: "B0001", encounters: 2, records: 3, dental_classification: "ABC", collection: "Collection A" },
            { id: "B0002", encounters: 3, records: 4, dental_classification: "DEF", collection: "Collection B" },
        ]
        let tableBody;
        const page_size = 20;

        function populate() {
            if (!loaded) return;

            // populate table with subjects
            const rows = subjects.map(subject => {
                const row = document.createElement('tr');

                const id = document.createElement('td');
                id.textContent = subject.id;
                const encounters = document.createElement('td');
                encounters.textContent = subject.encounters;
                const records = document.createElement('td');
                records.textContent = subject.records;
                const dentalClassification = document.createElement('td');
                dentalClassification.textContent = subject.dental_classification;
                const collection = document.createElement('td');
                collection.textContent = subject.collection;

                row.replaceChildren(id, encounters, records, dentalClassification, collection);
                return row;
            });
            subject_table_body.replaceChildren(...rows);
        }

        document.addEventListener('DOMContentLoaded', () => {
            loaded = true;
            populate();
        });
    </script>
{% endblock %}
