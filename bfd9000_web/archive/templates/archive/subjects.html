{% extends 'archive/base_index.html' %} {% block content %}
<div class="flex-[1_1_0] flex flex-col overflow-auto">
    <div class="bg-base-200 p-3 border-b border-base-300">
        <div class="flex gap-2 items-center">
            <input
                type="text"
                id="search-input"
                placeholder="Search subjects by identifier..."
                class="input input-bordered input-sm flex-1 max-w-md"
            />
            <button id="search-button" class="btn btn-sm btn-primary">
                Search
            </button>
            <button id="clear-search-button" class="btn btn-sm btn-ghost">
                Clear
            </button>
        </div>
    </div>
    <div class="min-w-0 flex-[1_1_0] overflow-y-auto">
        <table
            class="table table-xs md:table-sm lg:table-md table-pin-rows table-zebra"
        >
            <!-- head -->
            <thead>
                <tr>
                    <th>Subject</th>
                    <th>Encounters</th>
                    <th>Records</th>
                    <th>Dental Classification</th>
                    <th>Collection</th>
                </tr>
            </thead>
            <tbody id="subject_table_body">
                {% for _ in ' ' %}
                <tr>
                    <td colspan="9">
                        <div class="flex w-full gap-4">
                            <div class="skeleton h-[1lh] w-1/3"></div>
                            <div class="skeleton h-[1lh] grow"></div>
                            <div class="skeleton h-[1lh] w-1/2"></div>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <div class="bg-base-300 p-2 flex">
        <a
            href="{% url 'archive:subject_create' %}"
            class="btn btn-primary rounded-full"
            >New</a
        >
        <div class="grow"></div>
        <div class="join">
            <button
                class="join-item btn rounded-l-full"
                id="prev-button"
                disabled
            >
                «
            </button>
            <button class="join-item btn" id="page-button">Page 1 / 0</button>
            <button
                class="join-item btn rounded-r-full"
                id="next-button"
                disabled
            >
                »
            </button>
        </div>
    </div>
</div>
{% endblock %} {% block head %} {{ block.super }}

    /**
     * Fetch subjects from the API
     * @param {Object} params - Query parameters
     * @param {string} params.search - Search query for subject identifier
     * @param {number} params.page - Page number (1-indexed)
     * @param {number} params.page_size - Number of items per page
     * @returns {Promise<Object>} Response with { count, next, previous, results }
     *
     * TO SWITCH TO REAL API:
     * Replace the body of this function with:
     * const queryParams = new URLSearchParams({ search, page, page_size });
     * const response = await fetch(`/api/subjects/?${queryParams}`);
     * return await response.json();
     */
    async function fetchSubjects({
        search = "",
        page = 1,
        page_size = 20,
    } = {}) {
        // Simulate API delay
        await new Promise((resolve) => setTimeout(resolve, 300));

        // Filter subjects based on search query
        let filtered = DUMMY_SUBJECTS;
        if (search) {
            const searchLower = search.toLowerCase();
            filtered = DUMMY_SUBJECTS.filter((s) =>
                s.id.toLowerCase().includes(searchLower)
            );
        }

        // Paginate results
        const start = (page - 1) * page_size;
        const end = start + page_size;
        const results = filtered.slice(start, end);

        return {
            count: filtered.length,
            next: end < filtered.length ? page + 1 : null,
            previous: page > 1 ? page - 1 : null,
            results: results,
        };
    }

    // ========================================
    // TABLE SETUP USING PaginatedTableManager
    // ========================================

    const tableManager = new PaginatedTableManager({
        tableBodyId: "subject_table_body",
        columnCount: 5,
        fetchData: fetchSubjects,
        renderRows: (subjects) => {
            return subjects.map((subject) => {
                const row = document.createElement("tr");

                // Subject ID column with primary button
                const identifier = document.createElement("td");
                const subjectBtn = document.createElement("button");
                subjectBtn.className = "btn btn-soft btn-primary btn-xs";
                subjectBtn.textContent = subject.id;
                subjectBtn.onclick = () => {
                    // TODO: Navigate to subject detail page
                    console.log("Navigate to subject:", subject.id);
                };
                identifier.appendChild(subjectBtn);

                // Encounters column with default button
                const encounters = document.createElement("td");
                const encountersBtn = document.createElement("button");
                encountersBtn.className = "btn btn-soft btn-xs";
                encountersBtn.textContent = subject.encounters || 0;
                encountersBtn.onclick = () =>
                    (window.location.href = `/encounters?search=${subject.id}`);
                encounters.appendChild(encountersBtn);

                // Records column with default button
                const records = document.createElement("td");
                const recordsBtn = document.createElement("button");
                recordsBtn.className = "btn btn-soft btn-xs";
                recordsBtn.textContent = subject.records || 0;
                recordsBtn.onclick = () =>
                    (window.location.href = `/records?search=${subject.id}`);
                records.appendChild(recordsBtn);

                // Dental Classification column (no button)
                const dentalClassification = document.createElement("td");
                dentalClassification.textContent =
                    subject.dental_classification || "-";

                // Collection column (no button)
                const collection = document.createElement("td");
                collection.textContent = subject.collection || "-";

                row.replaceChildren(
                    identifier,
                    encounters,
                    records,
                    dentalClassification,
                    collection
                );
                return row;
            });
        },
        getEmptyStateMessage: (hasSearch) => {
            return hasSearch
                ? "No subjects found matching your search"
                : "No subjects found";
        },
    });

    // Initialize table when DOM is ready
    document.addEventListener("DOMContentLoaded", () => {
        tableManager.init();
    });
