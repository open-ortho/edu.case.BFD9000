{% extends 'archive/base_index.html' %} {% block content %}
<div class="flex-[1_1_0] flex flex-col overflow-x-auto p-8">
    <div class="max-w-2xl mx-auto w-full">
        <div class="prose prose-sm mb-6">
            <h2 class="!mt-0">New Subject</h2>
        </div>

        <form id="subject-form" class="space-y-4">
            <div class="form-control w-full">
                <label class="label">
                    <span class="label-text">Subject Identifier</span>
                </label>
                <input
                    type="text"
                    id="identifier"
                    name="identifier"
                    class="input input-bordered w-full"
                    placeholder="Subject Identifier (e.g., B0001)"
                    required
                />
            </div>

            <div class="form-control w-full">
                <label class="label">
                    <span class="label-text">Collection</span>
                </label>
                <input
                    type="text"
                    id="collection"
                    name="collection"
                    class="input input-bordered w-full"
                    placeholder="Collection Name"
                    required
                />
            </div>

            <div class="form-control w-full">
                <label class="label">
                    <span class="label-text">Sex</span>
                </label>
                <select
                    id="sex"
                    name="sex"
                    class="select select-bordered w-full"
                    required
                >
                    <option disabled selected>Select Sex</option>
                    <option value="M">Male</option>
                    <option value="F">Female</option>
                    <option value="O">Other</option>
                </select>
            </div>

            <!-- <div class="form-control w-full">
                <label class="label">
                    <span class="label-text">Date of Birth (Optional)</span>
                </label>
                <input
                    type="date"
                    id="date_of_birth"
                    name="date_of_birth"
                    class="input input-bordered w-full">
            </div> -->

            <div class="form-control w-full">
                <label class="label">
                    <span class="label-text"
                        >Dental Classification (Optional)</span
                    >
                </label>
                <input
                    type="text"
                    id="dental_classification"
                    name="dental_classification"
                    class="input input-bordered w-full"
                    placeholder="Dental Classification"
                />
            </div>

            <div
                id="error-message"
                class="alert alert-error hidden"
                role="alert"
            >
                <span id="error-text"></span>
            </div>

            <div class="flex gap-4 pt-4">
                <button type="submit" class="btn btn-primary" id="submit-btn">
                    Create Subject
                </button>
                <a href="{% url 'archive:subjects' %}" class="btn btn-ghost"
                    >Cancel</a
                >
            </div>
        </form>
    </div>
</div>
{% endblock %} {% block head %}
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const form = document.getElementById("subject-form");
        const submitBtn = document.getElementById("submit-btn");
        const errorMessage = document.getElementById("error-message");
        const errorText = document.getElementById("error-text");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            // Disable submit button
            submitBtn.disabled = true;
            submitBtn.innerHTML =
                '<span class="loading loading-spinner"></span> Creating...';

            // Hide any previous errors
            errorMessage.classList.add("hidden");

            // Get form data
            const formData = {
                identifier: document.getElementById("identifier").value,
                collection: document.getElementById("collection").value,
                sex: document.getElementById("sex").value,
            };

            // Add optional fields if provided
            // const dateOfBirth = document.getElementById("date_of_birth").value;
            // if (dateOfBirth) {
            //     formData.date_of_birth = dateOfBirth;
            // }

            const dentalClassification = document.getElementById(
                "dental_classification"
            ).value;
            if (dentalClassification) {
                formData.dental_classification = dentalClassification;
            }

            try {
                const response = await fetch("/api/subjects/", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRFToken": "{{ csrf_token }}",
                    },
                    body: JSON.stringify(formData),
                });

                if (response.ok) {
                    // Success - redirect to subjects page
                    window.location.href = "{% url 'archive:subjects' %}";
                } else {
                    // Handle error
                    const errorData = await response.json();
                    let errorMsg = "Failed to create subject. ";

                    if (errorData.error) {
                        errorMsg += errorData.error.message || "";
                        if (errorData.error.details) {
                            errorMsg +=
                                " " + JSON.stringify(errorData.error.details);
                        }
                    }

                    errorText.textContent = errorMsg;
                    errorMessage.classList.remove("hidden");

                    // Re-enable submit button
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Create Subject";
                }
            } catch (error) {
                errorText.textContent = "Network error: " + error.message;
                errorMessage.classList.remove("hidden");

                // Re-enable submit button
                submitBtn.disabled = false;
                submitBtn.textContent = "Create Subject";
            }
        });
    });
</script>
{% endblock %}
