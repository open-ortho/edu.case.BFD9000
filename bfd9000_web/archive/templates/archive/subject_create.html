{% extends 'archive/base_index.html' %} {% block content %}
<div class="flex-[1_1_0] flex flex-col overflow-x-auto p-8">
    <div class="max-w-2xl mx-auto w-full">
        <div class="prose prose-sm mb-6">
            <h2 class="!mt-0">New Subject</h2>
        </div>

        <form id="subject-form" class="space-y-4">
            <div class="form-control w-full">
                <label class="label">
                    <span class="label-text">Subject Identifier</span>
                </label>
                <input
                    type="text"
                    id="identifier"
                    name="identifier"
                    class="input input-bordered w-full"
                    placeholder="Subject Identifier (e.g., B0001)"
                    required
                />
            </div>

            <div class="form-control w-full">
                <label class="label">
                    <span class="label-text">Collection</span>
                </label>
                <input
                    type="text"
                    id="collection"
                    name="collection"
                    class="input input-bordered w-full"
                    placeholder="Collection Name"
                    required
                />
            </div>

            <div class="form-control w-full">
                <label class="label">
                    <span class="label-text">Sex</span>
                </label>
                <select
                    id="gender"
                    name="gender"
                    class="select select-bordered w-full"
                    required
                >
                    <option disabled selected>Select Sex</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <!-- <div class="form-control w-full">
                <label class="label">
                    <span class="label-text">Date of Birth (Optional)</span>
                </label>
                <input
                    type="date"
                    id="date_of_birth"
                    name="date_of_birth"
                    class="input input-bordered w-full">
            </div> -->

            <div class="form-control w-full">
                <label class="label">
                    <span class="label-text"
                        >Dental Classification (Optional)</span
                    >
                </label>
                <input
                    type="text"
                    id="dental_classification"
                    name="dental_classification"
                    class="input input-bordered w-full"
                    placeholder="Dental Classification"
                />
            </div>

            <div
                id="error-message"
                class="alert alert-error hidden"
                role="alert"
            >
                <span id="error-text"></span>
            </div>

            <div class="flex gap-4 pt-4">
                <button type="submit" class="btn btn-primary" id="submit-btn">
                    Create Subject
                </button>
                <a href="{% url 'archive:subjects' %}" class="btn btn-ghost"
                    >Cancel</a
                >
            </div>
        </form>
    </div>
</div>
{% endblock %} {% block head %}
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const form = document.getElementById("subject-form");
        const submitBtn = document.getElementById("submit-btn");
        const errorMessage = document.getElementById("error-message");
        const errorText = document.getElementById("error-text");

        function resolveIdentifierSystem(identifier) {
            if (!identifier) {
                return null;
            }

            if (/^B\d{4}$/i.test(identifier)) {
                return "{{ bolton_identifier_system|escapejs }}";
            }

            if (/^L\d{8}$/i.test(identifier)) {
                return "{{ lancaster_identifier_system|escapejs }}";
            }

            return null;
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            // Disable submit button
            submitBtn.disabled = true;
            submitBtn.innerHTML =
                '<span class="loading loading-spinner"></span> Creating...';

            // Hide any previous errors
            errorMessage.classList.add("hidden");

            const identifier = document.getElementById("identifier").value.trim();
            const identifierSystem = resolveIdentifierSystem(identifier);

            if (identifier && !identifierSystem) {
                errorText.textContent = "Identifier must match Bolton (B0001) or Lancaster (L########) format.";
                errorMessage.classList.remove("hidden");
                submitBtn.disabled = false;
                submitBtn.textContent = "Create Subject";
                return;
            }

            // Build request body matching backend API format
            // Note: Backend requires birth_date, humanname_family, humanname_given
            // Using the identifier as a placeholder for name fields (per AGENTS.md these aren't exposed)
            const formData = {
                gender: document.getElementById("gender").value,
                // TODO: what to do with these unexposed fields?
                birth_date: '1970-01-01',
                humanname_family: 'MISSING',
                humanname_given: 'MISSING',
                collection: document.getElementById("collection").value || null,
            };

            if (identifier) {
                formData.identifier_value = identifier;
                formData.identifier_system = identifierSystem;
            }

            try {
                const response = await fetch((window.script_name || '') + "/api/subjects/", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRFToken": "{{ csrf_token }}",
                    },
                    body: JSON.stringify(formData),
                });

                if (response.ok) {
                    // Success - redirect to subjects page
                    window.location.href = "{% url 'archive:subjects' %}";
                } else {
                    // Handle error
                    const errorData = await response.json();
                    let errorMsg = "Failed to create subject. ";

                    if (errorData?.error) {
                        errorMsg += errorData.error.message || '';
                        if (errorData.error.details) {
                            errorMsg += ' ' + JSON.stringify(errorData.error.details);
                        }
                    } else if (typeof errorData === 'object') {
                        const details = Object.entries(errorData)
                            .map(([field, msgs]) => `${field}: ${Array.isArray(msgs) ? msgs.join(', ') : msgs}`)
                            .join('; ');
                        errorMsg += details;
                    }

                    errorText.textContent = errorMsg;
                    errorMessage.classList.remove("hidden");

                    // Re-enable submit button
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Create Subject";
                }
            } catch (error) {
                errorText.textContent = "Network error: " + error.message;
                errorMessage.classList.remove("hidden");

                // Re-enable submit button
                submitBtn.disabled = false;
                submitBtn.textContent = "Create Subject";
            }
        });
    });
</script>
{% endblock %}
