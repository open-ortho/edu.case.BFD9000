{% extends 'archive/base_index.html' %} {% block content %}
<div class="flex-[1_1_0] flex flex-col overflow-auto">
    <div class="bg-base-200 p-3 border-b border-base-300">
        <div class="flex gap-2 items-center">
            <input
                type="text"
                id="search-input"
                placeholder="Search records by subject or encounter..."
                class="input input-bordered input-sm flex-1 max-w-md"
            />
            <button id="search-button" class="btn btn-sm btn-primary">
                Search
            </button>
            <button id="clear-search-button" class="btn btn-sm btn-ghost">
                Clear
            </button>
        </div>
    </div>
    <div class="min-w-0 flex-[1_1_0] overflow-y-auto">
        <table
            class="table table-xs md:table-sm lg:table-md table-pin-rows table-zebra"
        >
            <!-- head -->
            <thead>
                <tr>
                    <th>Record ID</th>
                    <th>Encounter</th>
                    <th>Subject</th>
                    <th>Date</th>
                    <th>File Size</th>
                    <th>Image Type</th>
                </tr>
            </thead>
            <tbody id="record_table_body">
                {% for _ in ' ' %}
                <tr>
                    <td colspan="6">
                        <div class="flex w-full gap-4">
                            <div class="skeleton h-[1lh] w-1/3"></div>
                            <div class="skeleton h-[1lh] grow"></div>
                            <div class="skeleton h-[1lh] w-1/2"></div>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <div class="bg-base-300 p-2 flex">
        <a href="#" class="btn btn-primary rounded-full">New</a>
        <div class="grow"></div>
        <div class="join">
            <button
                class="join-item btn rounded-l-full"
                id="prev-button"
                disabled
            >
                «
            </button>
            <button class="join-item btn" id="page-button">Page 1 / 0</button>
            <button
                class="join-item btn rounded-r-full"
                id="next-button"
                disabled
            >
                »
            </button>
        </div>
    </div>
</div>
{% endblock %} {% block head %} {{ block.super }}

    /**
     * Fetch records from the API
     * @param {Object} params - Query parameters
     * @param {string} params.search - Search query for subject or encounter identifier
     * @param {number} params.page - Page number (1-indexed)
     * @param {number} params.page_size - Number of items per page
     * @returns {Promise<Object>} Response with { count, next, previous, results }
     *
     * TO SWITCH TO REAL API:
     * Replace the body of this function with:
     * const queryParams = new URLSearchParams({ search, page, page_size });
     * const response = await fetch(`/api/records/?${queryParams}`);
     * return await response.json();
     */
    async function fetchRecords({
        search = "",
        page = 1,
        page_size = 20,
    } = {}) {
        // Simulate API delay
        await new Promise((resolve) => setTimeout(resolve, 300));

        // Filter records based on search query (searches subject_id and encounter_id)
        let filtered = DUMMY_RECORDS;
        if (search) {
            const searchLower = search.toLowerCase();
            filtered = DUMMY_RECORDS.filter(
                (r) =>
                    r.subject_id.toLowerCase().includes(searchLower) ||
                    r.encounter_id.toLowerCase().includes(searchLower)
            );
        }

        // Paginate results
        const start = (page - 1) * page_size;
        const end = start + page_size;
        const results = filtered.slice(start, end);

        return {
            count: filtered.length,
            next: end < filtered.length ? page + 1 : null,
            previous: page > 1 ? page - 1 : null,
            results: results,
        };
    }

    // ========================================
    // TABLE SETUP USING PaginatedTableManager
    // ========================================

    const tableManager = new PaginatedTableManager({
        tableBodyId: "record_table_body",
        columnCount: 6,
        fetchData: fetchRecords,
        renderRows: (records) => {
            return records.map((record) => {
                const row = document.createElement("tr");

                // Record ID column with primary button
                const recordId = document.createElement("td");
                const recordBtn = document.createElement("button");
                recordBtn.className = "btn btn-soft btn-primary btn-xs";
                recordBtn.textContent = record.id;
                recordBtn.onclick = () => {
                    // Navigate to record detail page
                    window.location.href = `/records/${record.id}/`;
                };
                recordId.appendChild(recordBtn);

                // Encounter ID column with button
                const encounter = document.createElement("td");
                const encounterBtn = document.createElement("button");
                encounterBtn.className = "btn btn-soft btn-xs";
                encounterBtn.textContent = record.encounter_id;
                encounterBtn.onclick = () =>
                    (window.location.href = `/records?search=${record.encounter_id}`);
                encounter.appendChild(encounterBtn);

                // Subject ID column with button
                const subject = document.createElement("td");
                const subjectBtn = document.createElement("button");
                subjectBtn.className = "btn btn-soft btn-xs";
                subjectBtn.textContent = record.subject_id;
                subjectBtn.onclick = () =>
                    (window.location.href = `/records?search=${record.subject_id}`);
                subject.appendChild(subjectBtn);

                // Date column (plain text)
                const date = document.createElement("td");
                date.textContent = record.date || "-";

                // File size column (plain text)
                const fileSize = document.createElement("td");
                fileSize.textContent = record.file_size || "-";

                // Image type column (plain text)
                const imageType = document.createElement("td");
                imageType.textContent = record.image_type || "-";

                row.replaceChildren(
                    recordId,
                    encounter,
                    subject,
                    date,
                    fileSize,
                    imageType
                );
                return row;
            });
        },
        getEmptyStateMessage: (hasSearch) => {
            return hasSearch
                ? "No records found matching your search"
                : "No records found";
        },
    });

    // Initialize table when DOM is ready
    document.addEventListener("DOMContentLoaded", () => {
        tableManager.init();
    });
