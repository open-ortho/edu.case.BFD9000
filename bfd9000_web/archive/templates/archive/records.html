{% extends 'archive/base_index.html' %} {% block content %}
<div class="flex-[1_1_0] flex flex-col overflow-auto">
    <div class="bg-base-200 p-3 border-b border-base-300">
        <div class="flex gap-2 items-center">
            <input
                type="text"
                id="search-input"
                placeholder="Search by subject identifier"
                class="input input-bordered input-sm flex-1 max-w-md"
            />
            <button id="search-button" class="btn btn-sm btn-primary">
                Search
            </button>
            <button id="clear-search-button" class="btn btn-sm btn-ghost">
                Clear
            </button>
        </div>
    </div>
    <div class="min-w-0 flex-[1_1_0] overflow-y-auto">
        <table
            class="table table-xs md:table-sm lg:table-md table-pin-rows table-zebra"
        >
            <!-- head -->
            <thead>
                <tr>
                    <th>Record ID</th>
                    <th>Record Type</th>
                    <th>Modality</th>
                    <th>Age</th>
                    <th>Subject</th>
                    <th>Encounter</th>
                    <th>File Size</th>
                </tr>
            </thead>
            <tbody id="record_table_body">
                {% for _ in ' ' %}
                <tr>
                    <td colspan="7">
                        <div class="flex w-full gap-4">
                            <div class="skeleton h-[1lh] w-1/3"></div>
                            <div class="skeleton h-[1lh] grow"></div>
                            <div class="skeleton h-[1lh] w-1/2"></div>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <div class="bg-base-300 p-2 flex items-center gap-3">
        <a href="{% url 'archive:record_create' %}" class="btn btn-primary rounded-full">Add Record</a>
        <div class="grow"></div>
        <span class="text-sm text-base-content/60">
            <span id="record-count-badge"></span>
            <span class="ml-1">records</span>
        </span>
    </div>
</div>
{% endblock %} {% block head %} {{ block.super }}
<script>
    // ========================================
    // DATA LAYER - Real API Implementation
    // ========================================

    /**
     * Fetch records from the API
     * @param {Object} params - Query parameters
     * @param {string} params.search - Search query
     * @param {string} params.subject - Filter by subject ID
     * @param {string} params.encounter - Filter by encounter PK
     * @param {number} params.page - Page number (1-indexed)
     * @param {number} params.page_size - Number of items per page
     * @returns {Promise<Object>} Response with { count, next, previous, results }
     */
    async function fetchRecords(params = {}) {
        const { search = "", page = 1, page_size = 20, ...extra } = params;
        const urlParams = new URLSearchParams({
            page: page.toString(),
            page_size: page_size.toString(),
        });

        if (search) {
            urlParams.set("search", search);
        }
        // Forward any custom filter params (e.g. series__imaging_study__encounter__id)
        for (const [key, value] of Object.entries(extra)) {
            if (value !== null && value !== undefined && value !== "") {
                urlParams.set(key, value.toString());
            }
        }

        const response = await fetch((window.script_name || '') + `/api/records/?${urlParams}`);
        if (!response.ok) {
            throw new Error(`API error: ${response.status}`);
        }
        return await response.json();
    }

    // ========================================
    // TABLE SETUP USING InfiniteScrollTableManager
    // ========================================

    function formatAge(record) {
        const ageYears = record.age_at_encounter;
        if (ageYears === null || ageYears === undefined) {
            return "-";
        }

        const wholeYears = Math.floor(ageYears);
        let months = Math.round((ageYears - wholeYears) * 12);
        let years = wholeYears;
        if (months === 12) {
            years += 1;
            months = 0;
        }

        let ageText = `${years}y ${months}m`;

        if (record.actual_period_start_uncertain) {
            const precision = record.actual_period_start_precision;
            if (precision === "month") {
                ageText += " +/- 1m";
            } else if (precision === "year") {
                ageText += " +/- 1y";
            } else {
                ageText += " +/-";
            }
        }

        return ageText;
    }

    const tableManager = new InfiniteScrollTableManager({
        tableBodyId: "record_table_body",
        columnCount: 7,
        countBadgeId: "record-count-badge",
        fetchData: fetchRecords,
        renderRows: (records) => {
            return records.map((record) => {
                const row = document.createElement("tr");

                // Record ID column with primary button
                const recordId = document.createElement("td");
                const recordBtn = document.createElement("button");
                recordBtn.className = "btn btn-soft btn-primary btn-xs";
                recordBtn.textContent = record.identifier_str || record.id;
                recordBtn.onclick = () => {
                    // Navigate to record detail page
                    window.location.href = (window.script_name || '') + `/records/${record.id}/`;
                };
                recordId.appendChild(recordBtn);

                // Record Type column (display value with code as tooltip)
                const recordType = document.createElement("td");
                recordType.textContent = record.record_type?.display || record.record_type?.code || "-";
                if (record.record_type?.code) {
                    recordType.title = record.record_type.code;
                }

                // Modality column (code with full term tooltip)
                const modality = document.createElement("td");
                const modalityCode = record.series_modality?.code || "-";
                const modalityDisplay = record.series_modality?.display;
                modality.textContent = modalityCode;
                if (modalityDisplay) {
                    modality.title = modalityDisplay;
                }

                // Age column (years/months with uncertainty when applicable)
                const age = document.createElement("td");
                age.textContent = formatAge(record);

                // Subject ID column with button
                const subject = document.createElement("td");
                const subjectBtn = document.createElement("button");
                subjectBtn.className = "btn btn-soft btn-xs";
                subjectBtn.textContent = record.subject_identifier || record.subject_id || "-";
                subjectBtn.onclick = () =>
                    (window.location.href = (window.script_name || '') + `/encounters/?subject=${record.subject_id}`);
                subject.appendChild(subjectBtn);

                // Encounter ID column with button — filters records for this encounter
                const encounter = document.createElement("td");
                const encounterBtn = document.createElement("button");
                encounterBtn.className = "btn btn-soft btn-xs";
                encounterBtn.textContent = record.encounter_id || "-";
                encounterBtn.onclick = () => {
                    const params = new URLSearchParams();
                    params.set("encounter", record.encounter_id);
                    window.location.href = (window.script_name || '') + `/records/?${params.toString()}`;
                };
                encounter.appendChild(encounterBtn);

                // File size column (plain text)
                const fileSize = document.createElement("td");
                fileSize.textContent = record.file_size
                    ? (record.file_size / (1024 * 1024)).toFixed(1) + " MB"
                    : "-";

                row.replaceChildren(
                    recordId,
                    recordType,
                    modality,
                    age,
                    subject,
                    encounter,
                    fileSize
                );
                return row;
            });
        },
        getEmptyStateMessage: (hasSearch) => {
            return hasSearch
                ? "No records found matching your search"
                : "No records found";
        },
    });

    // Initialize table when DOM is ready
    document.addEventListener("DOMContentLoaded", () => {
        tableManager.init();
        attachSearchTooltip();
    });
</script>
{% endblock %}
