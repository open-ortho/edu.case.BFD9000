{% extends 'archive/base_index.html' %} {% block content %}
<div class="flex-[1_1_0] flex flex-col overflow-auto">
    <div class="bg-base-200 p-3 border-b border-base-300">
        <div class="flex gap-2 items-center">
            <input
                type="text"
                id="search-input"
                placeholder="Search encounters by subject..."
                class="input input-bordered input-sm flex-1 max-w-md"
            />
            <button id="search-button" class="btn btn-sm btn-primary">
                Search
            </button>
            <button id="clear-search-button" class="btn btn-sm btn-ghost">
                Clear
            </button>
        </div>
    </div>
    <div class="min-w-0 flex-[1_1_0] overflow-y-auto">
        <table
            class="table table-xs md:table-sm lg:table-md table-pin-rows table-zebra"
        >
            <!-- head -->
            <thead>
                <tr>
                    <th>Encounter ID</th>
                    <th>Subject</th>
                    <th>Records</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody id="encounter_table_body">
                {% for _ in ' ' %}
                <tr>
                    <td colspan="4">
                        <div class="flex w-full gap-4">
                            <div class="skeleton h-[1lh] w-1/3"></div>
                            <div class="skeleton h-[1lh] grow"></div>
                            <div class="skeleton h-[1lh] w-1/2"></div>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <div class="bg-base-300 p-2 flex">
        <a href="#" class="btn btn-primary rounded-full">New</a>
        <div class="grow"></div>
        <div class="join">
            <button
                class="join-item btn rounded-l-full"
                id="prev-button"
                disabled
            >
                «
            </button>
            <button class="join-item btn" id="page-button">Page 1 / 0</button>
            <button
                class="join-item btn rounded-r-full"
                id="next-button"
                disabled
            >
                »
            </button>
        </div>
    </div>
</div>
{% endblock %} {% block head %} {{ block.super }}

    /**
     * Fetch encounters from the API
     * @param {Object} params - Query parameters
     * @param {string} params.search - Search query for subject identifier
     * @param {number} params.page - Page number (1-indexed)
     * @param {number} params.page_size - Number of items per page
     * @returns {Promise<Object>} Response with { count, next, previous, results }
     *
     * TO SWITCH TO REAL API:
     * Replace the body of this function with:
     * const queryParams = new URLSearchParams({ search, page, page_size });
     * const response = await fetch(`/api/encounters/?${queryParams}`);
     * return await response.json();
     */
    async function fetchEncounters({
        search = "",
        page = 1,
        page_size = 20,
    } = {}) {
        // Simulate API delay
        await new Promise((resolve) => setTimeout(resolve, 300));

        // Filter encounters based on search query (searches subject_id)
        let filtered = DUMMY_ENCOUNTERS;
        if (search) {
            const searchLower = search.toLowerCase();
            filtered = DUMMY_ENCOUNTERS.filter((e) =>
                e.subject_id.toLowerCase().includes(searchLower)
            );
        }

        // Paginate results
        const start = (page - 1) * page_size;
        const end = start + page_size;
        const results = filtered.slice(start, end);

        return {
            count: filtered.length,
            next: end < filtered.length ? page + 1 : null,
            previous: page > 1 ? page - 1 : null,
            results: results,
        };
    }

    // ========================================
    // TABLE SETUP USING PaginatedTableManager
    // ========================================

    const tableManager = new PaginatedTableManager({
        tableBodyId: "encounter_table_body",
        columnCount: 4,
        fetchData: fetchEncounters,
        renderRows: (encounters) => {
            return encounters.map((encounter) => {
                const row = document.createElement("tr");

                // Encounter ID column (plain text)
                const encounterId = document.createElement("td");
                const encounterBtn = document.createElement("button");
                encounterBtn.className = "btn btn-soft btn-xs";
                encounterBtn.textContent = encounter.id;
                encounterBtn.onclick = () =>
                    (window.location.href = `/records?search=${encounter.id}`);
                encounterId.appendChild(encounterBtn);

                // Subject ID column with primary button
                const subject = document.createElement("td");
                const subjectBtn = document.createElement("button");
                subjectBtn.className = "btn btn-soft btn-xs";
                subjectBtn.textContent = encounter.subject_id;
                subjectBtn.onclick = () => {
                    // TODO: Navigate to subject detail page
                    console.log("Navigate to subject:", encounter.subject_id);
                };
                subject.appendChild(subjectBtn);

                // Records column with default button
                const records = document.createElement("td");
                const recordsBtn = document.createElement("button");
                recordsBtn.className = "btn btn-soft btn-xs";
                recordsBtn.textContent = encounter.records || 0;
                recordsBtn.onclick = () =>
                    (window.location.href = `/records?search=${encounter.id}`);
                records.appendChild(recordsBtn);

                // Date column (plain text)
                const date = document.createElement("td");
                date.textContent = encounter.date || "-";

                row.replaceChildren(encounterId, subject, records, date);
                return row;
            });
        },
        getEmptyStateMessage: (hasSearch) => {
            return hasSearch
                ? "No encounters found matching your search"
                : "No encounters found";
        },
    });

    // Initialize table when DOM is ready
    document.addEventListener("DOMContentLoaded", () => {
        tableManager.init();
    });
</script>
{% endblock %}
