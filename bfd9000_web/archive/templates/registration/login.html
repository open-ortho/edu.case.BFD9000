<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Login · BFD9000</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .panel {
            background: #111c2e;
            padding: 2rem;
            border-radius: 1rem;
            border: 1px solid rgba(255,255,255,0.08);
            width: min(360px, 90vw);
        }
        h1 {
            margin-top: 0;
        }
        label {
            display: block;
            margin-bottom: 0.25rem;
            font-weight: 600;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.65rem 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid rgba(255,255,255,0.15);
            background: #0b1220;
            color: #e2e8f0;
            margin-bottom: 1rem;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            background: linear-gradient(135deg, #0ea5e9, #22d3ee);
            color: #041321;
            font-weight: 600;
            cursor: pointer;
        }
        .errorlist {
            color: #fda4af;
            margin: 0 0 1rem 0;
            padding: 0;
            list-style: none;
        }
    </style>
</head>
<body>
<div class="panel">
    <h1>Sign in to BFD9000</h1>
    <form method="post" novalidate>
        {% csrf_token %}
        {{ form.non_field_errors }}
        <label for="id_username">Username</label>
        {{ form.username }}

        <label for="id_password">Password</label>
        {{ form.password }}

        {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
        {% endif %}

        <button type="submit">Log in</button>
    </form>
</div>
</body>
</html>
