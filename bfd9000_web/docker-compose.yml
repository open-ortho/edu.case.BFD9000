name: bfd9000
services:
  db:
    image: postgres:17-alpine
    container_name: bfd9000_db
    environment:
      POSTGRES_DB: bfd9000
      POSTGRES_USER: bfd9000
      # WARNING: dev-only credentials — do not reuse in staging or production
      POSTGRES_PASSWORD: bfd9000_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bfd9000"]
      interval: 5s
      timeout: 5s
      retries: 5

  bfd9000:
    image: ghcr.io/open-ortho/edu.case.bfd9000:local
    container_name: bfd9000
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:9000:9000"
    depends_on:
      db:
        condition: service_healthy
    # env_file:
    #   - .env
    volumes:
      # Keep media files (uploads) persistent
      - media_volume:/app/media
    environment:
      - DEBUG=True
      - SECRET_KEY=dev_secret_key
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,[::1],0.0.0.0
      - ENDPOINT_CREDENTIALS_KEY=your_credentials_key_here
      # Database (PostgreSQL)
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=bfd9000
      - DB_USER=bfd9000
      # WARNING: dev-only credentials — do not reuse in staging or production
      - DB_PASSWORD=bfd9000_dev
      - DB_HOST=db
      - DB_PORT=5432
      # Local mode (no proxy, direct access at http://localhost:9000/):
      # - DJANGO_FORCE_SCRIPT_NAME=
      # - SCRIPT_NAME=

      # Subpath emulation mode (access app at http://localhost:9000/bfd9000/):
      # Enable BOTH lines below to emulate a proxy-mounted prefix locally.
      - DJANGO_FORCE_SCRIPT_NAME=/bfd9000
      - SCRIPT_NAME=/bfd9000
      - BFD9020_BASE_URL=http://localhost:9020
      # - BFD9020_BASE_URL=https://wingate.case.edu/bfd9020
      
      - SCANNER_API_BASE=http://127.0.0.1:9010

      # Box.com integration — use exactly one auth method (precedence: token > JWT > OAuth).
      # Credentials are read from Docker secrets (/run/secrets/<name>); env vars take precedence.
      # Create the secrets directory and populate the files you need:
      #   mkdir -p secrets
      #   echo "your_developer_token"  > secrets/BOX_DEVELOPER_TOKEN   # Option A (dev only)
      #   echo "100123456789"          > secrets/BOX_FOLDER_ID
      #   echo "your_client_id"        > secrets/BOX_OAUTH_CLIENT_ID   # Option C
      #   echo "your_client_secret"    > secrets/BOX_OAUTH_CLIENT_SECRET
      # - BOX_DEVELOPER_TOKEN=your_developer_token_here  # env-var alternative (dev only)
      # - BOX_OAUTH_CLIENT_ID=your_client_id_here        # env-var alternative
    secrets:
      - BOX_DEVELOPER_TOKEN
      - BOX_FOLDER_ID
      - BOX_OAUTH_CLIENT_ID
      - BOX_OAUTH_CLIENT_SECRET
      # - BOX_JWT_CONFIG_FILE  # path inside container; volume-mount the JSON file separately

  bfd9020:
    image: ghcr.io/open-ortho/edu.case.bfd9020:local
    container_name: bfd9020
    ports:
      - "127.0.0.1:9020:9020"
    environment:
      LOG_LEVEL: "INFO"
      ROOT_PATH: ""
      ENABLE_DOCS: "true"

  mock-bfd9010:
    image: mock-bfd9010:local
    container_name: mock_bfd9010
    build:
      context: ../dev_tools/mock_bfd9010
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:9010:9010"

volumes:
  media_volume:
  postgres_data:

secrets:
  BOX_DEVELOPER_TOKEN:
    file: ./secrets/BOX_DEVELOPER_TOKEN    # Option A: echo "your_token"        > secrets/BOX_DEVELOPER_TOKEN
  BOX_FOLDER_ID:
    file: ./secrets/BOX_FOLDER_ID          #           echo "100123456789"       > secrets/BOX_FOLDER_ID
  BOX_OAUTH_CLIENT_ID:
    file: ./secrets/BOX_OAUTH_CLIENT_ID    # Option C: echo "your_client_id"    > secrets/BOX_OAUTH_CLIENT_ID
  BOX_OAUTH_CLIENT_SECRET:
    file: ./secrets/BOX_OAUTH_CLIENT_SECRET #          echo "your_client_secret" > secrets/BOX_OAUTH_CLIENT_SECRET
